{% extends "base.html" %}

{% block title %}Error - YouTube Transcriber{% endblock %}

{% block content %}
<div class="flex justify-center items-center py-16">
    <div class="surface max-w-lg w-full">
        <div class="surface-body text-center py-10">
            <i class="iconoir-warning-triangle" style="font-size: 2.5rem; color: var(--error); display: block; margin-bottom: 1rem;"></i>
            <h1 class="page-title mb-2" style="color: var(--error);">Error</h1>
            <p class="text-muted mb-6">{{ message }}</p>
            <a href="/" class="btn btn-primary">
                <i class="iconoir-home-simple" style="font-size:0.85rem"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
