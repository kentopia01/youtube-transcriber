{% extends "base.html" %}

{% block title %}Job {{ job.id }} - YouTube Transcriber{% endblock %}

{% block content %}
<!-- Breadcrumb -->
<nav class="breadcrumb">
    <a href="/"><i class="iconoir-home-simple" style="font-size:0.85rem"></i> Dashboard</a>
    <span class="breadcrumb-sep"><i class="iconoir-nav-arrow-right" style="font-size:0.7rem"></i></span>
    <span>Job Details</span>
</nav>

<div class="page-head">
    <p class="kicker mb-1">Pipeline</p>
    <h1 class="page-title">Job Details</h1>
    <p class="page-subtitle">Inspect pipeline progress, timestamps, and retry/cancel controls.</p>
</div>

<div id="job-status-container"
     hx-get="/jobs/{{ job.id }}"
     hx-trigger="{% if job.status in ['running', 'queued', 'pending'] %}load delay:2s{% endif %}"
     hx-target="#job-status-container"
     hx-swap="innerHTML">
    {% include "partials/job_status.html" %}
</div>
{% endblock %}
