{% extends "base.html" %}

{% block title %}Job {{ job.id }} - YouTube Transcriber{% endblock %}

{% block content %}
<div class="breadcrumbs text-sm mb-4">
    <ul>
        <li><a href="/">Dashboard</a></li>
        <li>Job Details</li>
    </ul>
</div>

<div class="app-page-head">
    <h1 class="app-page-title">Job Details</h1>
    <p class="app-page-subtitle">Inspect pipeline progress, timestamps, and retry/cancel controls.</p>
</div>

<div id="job-status-container"
     hx-get="/jobs/{{ job.id }}"
     hx-trigger="{% if job.status in ['running', 'queued', 'pending'] %}load delay:2s{% endif %}"
     hx-target="#job-status-container"
     hx-swap="innerHTML">
    {% include "partials/job_status.html" %}
</div>
{% endblock %}
