{% extends "base.html" %}

{% block title %}Search - YouTube Transcriber{% endblock %}

{% block content %}
<div class="app-page-head">
    <h1 class="app-page-title">Semantic Search</h1>
    <p class="app-page-subtitle">Search across all transcribed video content using natural language.</p>
</div>

<div class="card bg-base-100 shadow-sm border border-base-200 mb-6">
    <div class="card-body p-5">
        <form hx-post="/api/search"
              hx-target="#search-results"
              hx-trigger="submit"
              hx-indicator="#search-loading">
            <div class="flex gap-2">
                <input type="text" name="query" placeholder="What are you looking for?"
                       hx-post="/api/search"
                       hx-target="#search-results"
                       hx-trigger="keyup changed delay:500ms"
                       hx-include="[name='query']"
                       class="input input-bordered flex-1"
                       autofocus>
                <button type="submit" class="btn app-btn-primary">Search</button>
            </div>
        </form>
    </div>
</div>

<span id="search-loading" class="htmx-indicator inline-flex items-center gap-2 mb-4">
    <span class="loading loading-spinner loading-sm"></span>
    <span class="text-sm text-base-content/60">Searching...</span>
</span>

<div id="search-results"></div>
{% endblock %}
