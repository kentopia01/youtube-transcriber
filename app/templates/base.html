<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}YouTube Transcriber{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme { --font-sans: 'Inter', sans-serif; }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="bg-base-200 min-h-screen">
    <!-- Mobile top bar -->
    <div class="lg:hidden navbar bg-base-100 shadow-sm sticky top-0 z-50">
        <div class="flex-none">
            <label for="sidebar-drawer" class="btn btn-ghost btn-sm drawer-button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </label>
        </div>
        <div class="flex-1">
            <a href="/" class="btn btn-ghost text-lg font-bold">YT Transcriber</a>
        </div>
    </div>

    <div class="drawer lg:drawer-open">
        <input id="sidebar-drawer" type="checkbox" class="drawer-toggle" />

        <!-- Main content -->
        <div class="drawer-content lg:ml-64">
            <main class="p-6 lg:p-8 min-h-screen">
                {% block content %}{% endblock %}
            </main>
        </div>

        <!-- Sidebar -->
        <div class="drawer-side z-40">
            <label for="sidebar-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
            <aside class="bg-base-100 border-r border-base-300 w-64 h-screen flex flex-col lg:fixed lg:left-0 lg:top-0">
                <!-- Logo -->
                <div class="px-6 py-5 border-b border-base-200">
                    <a href="/" class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary-content" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <span class="text-lg font-bold tracking-tight">YT Transcriber</span>
                    </a>
                </div>

                <!-- Navigation -->
                <nav class="flex-1 px-4 py-4">
                    <ul class="menu menu-sm gap-1">
                        <li class="menu-title text-xs uppercase tracking-wider text-base-content/40 px-2 pt-2 pb-1">Main</li>
                        <li>
                            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if request.url.path == '/' %}active bg-primary/10 text-primary font-medium{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                                Dashboard
                            </a>
                        </li>
                        <li>
                            <a href="/library" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if '/library' in request.url.path or '/videos' in request.url.path or '/channels' in request.url.path %}active bg-primary/10 text-primary font-medium{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                </svg>
                                Library
                            </a>
                        </li>
                        <li>
                            <a href="/search" class="flex items-center gap-3 px-3 py-2.5 rounded-lg {% if '/search' in request.url.path %}active bg-primary/10 text-primary font-medium{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                Search
                            </a>
                        </li>
                    </ul>
                </nav>

                <!-- Footer -->
                <div class="px-6 py-4 border-t border-base-200">
                    <p class="text-xs text-base-content/40">Powered by faster-whisper, Claude &amp; pgvector</p>
                </div>
            </aside>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
