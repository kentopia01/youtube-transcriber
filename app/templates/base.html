<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}YouTube Transcriber{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="min-h-screen">

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="/" class="nav-brand">
                <span class="nav-brand-icon"><i class="iconoir-play-solid" style="font-size:0.85rem"></i></span>
                YT Transcriber
            </a>

            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}is-active{% endif %}">
                    <i class="iconoir-home-simple" style="font-size:0.95rem"></i> Dashboard
                </a>
                <a href="/queue" class="nav-link {% if '/queue' in request.url.path or '/jobs' in request.url.path %}is-active{% endif %}">
                    <i class="iconoir-list" style="font-size:0.95rem"></i> Queue
                </a>
                <a href="/library" class="nav-link {% if '/library' in request.url.path %}is-active{% endif %}">
                    <i class="iconoir-book" style="font-size:0.95rem"></i> Library
                </a>
                <a href="/chat" class="nav-link {% if '/chat' in request.url.path %}is-active{% endif %}">
                    <i class="iconoir-chat-bubble" style="font-size:0.95rem"></i> Chat
                </a>
            </div>

            <div class="nav-actions">
                <a href="/search" class="btn btn-nav btn-sm">
                    <i class="iconoir-search" style="font-size:0.9rem"></i> Search
                </a>
                <a href="/" class="btn btn-nav-primary btn-sm">
                    <i class="iconoir-plus" style="font-size:0.9rem"></i> Submit
                </a>
            </div>

            <button class="nav-mobile-toggle" onclick="document.getElementById('mobile-nav').classList.toggle('is-open')" aria-label="Toggle menu">
                <i class="iconoir-menu" style="font-size:1.25rem"></i>
            </button>
        </div>

        <!-- Mobile nav dropdown -->
        <div id="mobile-nav" class="mobile-nav">
            <a href="/" class="nav-link {% if request.url.path == '/' %}is-active{% endif %}">
                <i class="iconoir-home-simple"></i> Dashboard
            </a>
            <a href="/queue" class="nav-link {% if '/queue' in request.url.path or '/jobs' in request.url.path %}is-active{% endif %}">
                <i class="iconoir-list"></i> Queue
            </a>
            <a href="/library" class="nav-link {% if '/library' in request.url.path %}is-active{% endif %}">
                <i class="iconoir-book"></i> Library
            </a>
            <a href="/chat" class="nav-link {% if '/chat' in request.url.path %}is-active{% endif %}">
                <i class="iconoir-chat-bubble"></i> Chat
            </a>
            <div class="nav-actions-mobile">
                <a href="/search" class="btn btn-nav btn-sm flex-1 text-center">
                    <i class="iconoir-search"></i> Search
                </a>
                <a href="/" class="btn btn-nav-primary btn-sm flex-1 text-center">
                    <i class="iconoir-plus"></i> Submit
                </a>
            </div>
        </div>
    </nav>

    <main class="{% block main_class %}page-shell{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-6 text-xs" style="color: var(--text-tertiary);">
        Powered by faster-whisper, Claude and pgvector
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
