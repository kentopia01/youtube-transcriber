services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transcriber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transcriber}
      POSTGRES_DB: ${POSTGRES_DB:-transcriber}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/create_extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcriber}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - audio_data:/data/audio
      - model_cache:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # NOTE: Worker and Flower have been replaced by the native macOS worker.
  # The native worker uses MLX (Metal-accelerated) transcription which cannot
  # run inside Docker. See scripts/start_worker.sh and com.sentryclaw.yt-worker.plist.
  #
  # To use the Docker worker instead (e.g., on Linux), uncomment below and set
  # TRANSCRIPTION_ENGINE=faster-whisper in .env.
  #
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.worker
  #   env_file: .env
  #   volumes:
  #     - audio_data:/data/audio
  #     - model_cache:/data/models
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #
  # flower:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: celery -A app.tasks.celery_app flower --port=5555
  #   ports:
  #     - "5555:5555"
  #   env_file: .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
  audio_data:
  model_cache:
